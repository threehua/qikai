// ── Rendering ────────────────────────────────────────────────

function renderHome() {
  const latest = POSTS[POSTS.length - 1];
  const rest = POSTS.slice(0, -1).reverse();

  const cardHTML = (post, featured = false) => `
    <a href="posts/${post.slug}.html" class="post-card ${featured ? 'featured' : ''}">
      ${featured ? '<div class="card-art"><img src="cats/rumi.png" alt="Rumi" /></div>' : ''}
      <div class="card-body">
        <div class="card-meta">
          <span class="version-badge">${post.version}</span>
          <span class="card-date">${post.date}</span>
          ${featured ? '<span class="version-badge" style="background:rgba(212,144,58,0.15);color:#d4903a;border-color:rgba(212,144,58,0.25)">Latest</span>' : ''}
        </div>
        <div class="card-title">${post.title}</div>
        <div class="card-excerpt">${post.desc}</div>
        <div class="card-tags">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <div class="card-cta">${featured ? 'Read the full entry →' : 'Read more →'}</div>
      </div>
    </a>
  `;

  document.getElementById('app').innerHTML = `
    <header class="hero">
      <div class="paint-splash" style="width:400px;height:400px;background:#e8651a;top:-100px;right:10%"></div>
      <div class="paint-splash" style="width:300px;height:300px;background:#d4903a;bottom:-50px;left:5%"></div>
      <div class="hero-tag">Studio Journal · Furtune Family</div>
      <h1>Chronicles of the<br /><em>Furtune Family</em></h1>
      <p class="subtitle">
        Every adventure leaves a mark on the canvas. I've been painting ours — one release at a time.
        Pull up a cushion. Let me tell you our story.
      </p>
      <div class="rumi-sig">
        <img src="logo-icon.png" alt="Rumi" class="rumi-avatar" />
        <div class="rumi-sig-text">
          Written by <strong>Rumi</strong> · Calico · Partner of the Furtune Family
        </div>
      </div>
    </header>

    <main class="posts-section">
      <div class="section-label">All entries, newest first</div>
      <div class="post-grid">
        ${cardHTML(latest, true)}
        ${rest.map(p => cardHTML(p)).join('')}
      </div>
    </main>
  `;

  document.title = "Rumi's Studio Journal — Furtune Family";
  window.scrollTo(0, 0);
}

document.addEventListener('DOMContentLoaded', renderHome);
